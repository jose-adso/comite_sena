<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente - Sistema Macro Sena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css', v=5) }}">
</head>
<body class="bg-gradient-to-br from-blue-800 to-blue-900 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-black/30 backdrop-blur-md fixed top-0 left-0 right-0 z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-white text-xl font-bold">
                <i class="fas fa-graduation-cap mr-2"></i>Sistema Macro Sena
            </div>
            <div class="flex items-center gap-4">
                <span class="text-white"><i class="fas fa-user mr-2"></i>{{ username }}</span>
                <a href="/logout" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition-colors">
                    <i class="fas fa-sign-out-alt mr-2"></i>Cerrar Sesión
                </a>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <div class="max-w-4xl mx-auto mt-28 px-6 pb-10">
        <!-- Título -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">
                <i class="fas fa-clipboard-list mr-2"></i>Registro de Fallas
            </h1>
            <p class="text-blue-200">Instructor: {{ nombre_instructor }}</p>
        </div>

        <!-- Formulario -->
        <div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl p-8">
            <form method="POST" action="/registrar-falla" enctype="multipart/form-data">
                
                <!-- Fecha -->
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-calendar-alt mr-2 text-blue-600"></i>Fecha
                    </label>
                    <input type="date" name="fecha" required
                           class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                </div>

                <!-- Datos del Instructor -->
                <div class="grid md:grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-user mr-2 text-blue-600"></i>Nombre Instructor
                        </label>
                        <input type="text" name="nombre_instructor" required
                               placeholder="Nombre completo"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-id-card mr-2 text-blue-600"></i>Cédula Instructor
                        </label>
                        <input type="text" name="cedula_instructor" required
                               placeholder="Número de cédula"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-envelope mr-2 text-blue-600"></i>Correo Instructor
                        </label>
                        <input type="email" name="correo_instructor" required
                               placeholder="correo@institucion.edu"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                    </div>
                </div>

                <!-- Datos de la Ficha -->
                <div class="grid md:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-book mr-2 text-blue-600"></i>Nombre Ficha
                        </label>
                        <input type="text" name="nombre_ficha" required
                               placeholder="Nombre de la ficha"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-hashtag mr-2 text-blue-600"></i>Número de Ficha
                        </label>
                        <input type="text" name="numero_ficha" required
                               placeholder="Número de ficha"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                    </div>
                </div>

                <!-- Datos del Aprendiz -->
                <div class="grid md:grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-user-graduate mr-2 text-blue-600"></i>Nombre Aprendiz
                        </label>
                        <input type="text" name="nombre_aprendiz" required
                               placeholder="Nombre completo del aprendiz"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-id-badge mr-2 text-blue-600"></i>Documento Aprendiz
                        </label>
                        <input type="text" name="documento_aprendiz" required
                               placeholder="Número de documento"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-envelope mr-2 text-blue-600"></i>Correo Aprendiz
                        </label>
                        <input type="email" name="correo_aprendiz" required
                               placeholder="correo@aprendiz.edu"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                    </div>
                </div>

                <!-- Teléfono y Descripción -->
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-phone mr-2 text-blue-600"></i>Teléfono Aprendiz
                    </label>
                    <input type="tel" name="telefono_aprendiz" required
                           placeholder="Número de teléfono"
                           class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                </div>

                <div class="mb-8">
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-exclamation-triangle mr-2 text-red-500"></i>Descripción de Faltas
                    </label>
                    <textarea name="descripcion_faltas" required rows="5"
                              placeholder="Describa las fallas o infracciones del aprendiz..."
                              class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none transition-colors resize-none"></textarea>
                </div>

                <!-- Evidencia Fotográfica -->
                <div class="mb-8">
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-camera mr-2 text-blue-600"></i>Evidencia Fotográfica
                    </label>
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-blue-500 transition-colors cursor-pointer"
                         id="drop-zone">
                        <input type="file" name="evidencia" id="evidencia" accept="image/*" multiple
                               class="hidden" onchange="previewImages(this)">
                        <label for="evidencia" class="cursor-pointer">
                            <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3"></i>
                            <p class="text-gray-500">Haz clic para seleccionar imágenes o arrástralas aquí</p>
                            <p class="text-gray-400 text-sm mt-1">Formatos permitidos: JPG, PNG, WEBP</p>
                        </label>
                    </div>
                    <!-- Preview de imágenes -->
                    <div id="image-preview" class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4"></div>
                </div>

                <!-- Firma del Instructor -->
                <div class="mb-8">
                    <label class="block text-gray-700 font-semibold mb-2">
                        <i class="fas fa-signature mr-2 text-blue-600"></i>Firma del Instructor
                    </label>
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-blue-500 transition-colors cursor-pointer">
                        <input type="file" name="firma" id="firma" accept="image/*"
                               class="hidden" onchange="previewFirma(this)">
                        <label for="firma" class="cursor-pointer">
                            <i class="fas fa-pen-nib text-4xl text-gray-400 mb-3"></i>
                            <p class="text-gray-500">Haz clic para cargar tu firma</p>
                            <p class="text-gray-400 text-sm mt-1">Formatos permitidos: PNG, JPG</p>
                        </label>
                    </div>
                    <!-- Preview de firma -->
                    <div id="firma-preview" class="mt-4"></div>
                </div>

                <!-- Botones -->
                <div class="flex gap-4">
                    <button type="submit" 
                            class="flex-1 bg-gradient-to-r from-blue-700 to-blue-800 hover:from-blue-800 hover:to-blue-900 text-white font-semibold py-4 px-6 rounded-lg transition-all transform hover:scale-[1.02] shadow-lg">
                        <i class="fas fa-save mr-2"></i>Registrar Falla
                    </button>
                    <button type="reset" 
                            class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-4 px-6 rounded-lg transition-colors">
                        <i class="fas fa-undo mr-2"></i>Limpiar
                    </button>
                </div>
            </form>
        </div>

        <!-- Mensajes Flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mt-6">
                    {% for category, message in messages %}
                        <div class="p-4 rounded-lg mb-4 {% if category == 'success' %}bg-green-100 border border-green-400 text-green-700{% else %}bg-red-100 border border-red-400 text-red-700{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
    </div>

    <!-- Script para previsualizar imágenes -->
    <script>
        // Almacenar archivos originales
        let selectedFiles = [];
        
        function previewImages(input) {
            const preview = document.getElementById('image-preview');
            preview.innerHTML = '';
            
            // Actualizar el array de archivos
            if (input.files) {
                selectedFiles = Array.from(input.files);
            }
            
            if (selectedFiles.length > 0) {
                selectedFiles.forEach((file, index) => {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            const div = document.createElement('div');
                            div.className = 'relative rounded-lg overflow-hidden border-2 border-gray-200';
                            div.dataset.index = index;
                            div.innerHTML = `
                                <img src="${e.target.result}" class="w-full h-32 object-cover">
                                <button type="button" onclick="removeImage(${index})" class="absolute top-1 right-1 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm hover:bg-red-600">
                                    <i class="fas fa-times"></i>
                                </button>
                            `;
                            preview.appendChild(div);
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }
        }
        
        function removeImage(index) {
            // Remover el archivo del array
            if (selectedFiles[index]) {
                selectedFiles.splice(index, 1);
                
                // Actualizar el input file con los archivos restantes
                const dataTransfer = new DataTransfer();
                selectedFiles.forEach(file => {
                    dataTransfer.items.add(file);
                });
                document.getElementById('evidencia').files = dataTransfer.files;
                
                // Actualizar la previsualización
                previewImages(document.getElementById('evidencia'));
            }
        }

        // Drag and drop
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('evidencia');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-blue-500', 'bg-blue-50');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            // Actualizar el array de archivos seleccionados
            selectedFiles = Array.from(e.dataTransfer.files);
            fileInput.files = e.dataTransfer.files;
            previewImages(fileInput);
        });

        // Preview de firma
        function previewFirma(input) {
            const preview = document.getElementById('firma-preview');
            preview.innerHTML = '';
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `
                        <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-lg">
                            <img src="${e.target.result}" class="h-20 object-contain border">
                            <span class="text-green-600 font-medium"><i class="fas fa-check-circle"></i> Firma cargada correctamente</span>
                        </div>
                    `;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
