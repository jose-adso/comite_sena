<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css', v=8) }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Mensajes Flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="admin-panel">
            <h2>🔐 Iniciar Sesión</h2>
            <form action="/login" method="POST" id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="Ingrese su usuario">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Ingrese su contraseña">
                    <span class="password-toggle" onmouseenter="showPassword()" onmouseleave="hidePassword()">👁️</span>
                </div>
                <button type="submit" class="btn btn-primary">Ingresar</button>
            </form>

            <div style="text-align: center; margin-top: 15px;">
                <a href="{{ url_for('auth.olvide_password') }}" style="color: #198754; text-decoration: none; font-size: 0.9rem;">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

            <div class="security-badge">
                <span class="lock-icon">🔒</span>
                <span>Contraseña encriptada con Bcrypt</span>
            </div>
        </div>
    </div>

    <script>
        function showPassword() {
            document.getElementById('password').type = 'text';
        }

        function hidePassword() {
            document.getElementById('password').type = 'password';
        }
    </script>
</body>
</html>
