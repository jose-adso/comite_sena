<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuario</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css', v=8) }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Mensajes Flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="admin-panel">
            <h2>👤 Registrar Usuario</h2>
            <form action="{{ url_for('auth.registrar_usuario') }}" method="POST" id="registroForm">
                <div class="form-group">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required 
                           placeholder="Ingrese el nombre">
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" 
                           placeholder="Ingrese el apellido">
                </div>
                <div class="form-group">
                    <label for="correo">Correo Electrónico *</label>
                    <input type="email" id="correo" name="correo" required 
                           placeholder="Ingrese el correo electrónico">
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" 
                           placeholder="Ingrese el teléfono">
                </div>
                <div class="form-group">
                    <label for="rol">Rol *</label>
                    <select id="rol" name="rol" required>
                        <option value="">Seleccione un rol</option>
                        {% for rol in roles_validos %}
                            <option value="{{ rol }}">{{ rol }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña *</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Ingrese la contraseña">
                    <span class="password-toggle" onmouseenter="showPassword()" onmouseleave="hidePassword()">👁️</span>
                </div>
                <button type="submit" class="btn btn-primary">Registrar Usuario</button>
            </form>

            <div style="text-align: center; margin-top: 15px;">
                <a href="{{ url_for('auth.dashboard') }}" style="color: #198754; text-decoration: none; font-size: 0.9rem;">
                    ← Volver al Dashboard
                </a>
            </div>
        </div>
    </div>

    <script>
        function showPassword() {
            document.getElementById('password').type = 'text';
        }

        function hidePassword() {
            document.getElementById('password').type = 'password';
        }
    </script>
</body>
</html>
